name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-workflow-automation-assistant:ci .

      - name: Smoke test container health endpoint
        run: |
          trap 'docker rm -f awa-smoke || true' EXIT
          docker run -d --name awa-smoke -p 8000:8000 ai-workflow-automation-assistant:ci
          sleep 10
          curl --fail http://127.0.0.1:8000/health
